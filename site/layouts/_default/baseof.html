<!DOCTYPE html>
<!--

   в•”в•Ұв•—в”Ңв”Җв”җв”Ңв”Җв”җв”¬ в”¬в•”в•җв•—в”Ңв”Җв”җв”Ңв”¬в”җ
   в•‘в•‘в•‘в”ңв”Ө в””в”Җв”җв”ңв”Җв”Өв•ҡв•җв•—в”ңв”Җв”Ө в”Ӯ
   в•© в•©в””в”Җв”ҳв””в”Җв”ҳв”ҙ в”ҙв•ҡв•җв•қв”ҙ в”ҙ в”ҙ

   One gateway. Any transport.
   https://meshsat.net

   Built with care in the Netherlands
   Open Source: https://github.com/cubeos-app/meshsat

-->
<html lang="{{ .Site.LanguageCode | default "en" }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="author" content="{{ .Site.Params.author }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ .Title | default .Site.Title }}">
    <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:image" content="{{ "/images/og-image.png" | absURL }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .Title | default .Site.Title }}">
    <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="twitter:image" content="{{ "/images/og-image.png" | absURL }}">

    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | MeshSat{{ end }}</title>

    <!-- Theme detection (prevents flash) -->
    <script>
        (function() {
            var stored = localStorage.getItem('meshsat-theme');
            if (stored) {
                document.documentElement.setAttribute('data-theme', stored);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">

    <!-- Preload first hero image -->
    {{ if .IsHome }}
    <link rel="preload" href="/images/hero/field-comms.webp" as="image" fetchpriority="high">
    {{ end }}

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    {{ $css := resources.Get "css/main.css" | minify }}
    <link rel="stylesheet" href="{{ $css.RelPermalink }}">

    {{ partial "analytics.html" . }}

    <!-- Schema.org Structured Data -->
    {{ if .IsHome }}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "MeshSat",
        "description": "Multi-transport mesh and satellite gateway. Unified routing across LoRa, satellite, cellular, and IP networks.",
        "url": "https://meshsat.net",
        "applicationCategory": "CommunicationApplication",
        "operatingSystem": "Linux",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR"
        },
        "author": {
            "@type": "Organization",
            "name": "MeshSat",
            "url": "https://github.com/cubeos-app"
        }
    }
    </script>
    {{ end }}

    {{ block "head" . }}{{ end }}
</head>
<body>
    {{ partial "header.html" . }}

    <main id="main-content">
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}

    <script src="/js/main.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
