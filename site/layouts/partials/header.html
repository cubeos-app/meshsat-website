<header class="site-header">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav class="container" role="navigation" aria-label="Main navigation">
        <a href="/" class="logo" aria-label="MeshSat Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="32" height="32" class="logo-icon">
                <!-- Satellite dish base -->
                <ellipse cx="20" cy="32" rx="10" ry="3" fill="var(--color-primary)" opacity="0.3"/>
                <path d="M16 30 L20 14 L24 30" fill="none" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- Dish -->
                <path d="M8 18 Q20 2 32 18" fill="none" stroke="var(--color-primary)" stroke-width="2.5" stroke-linecap="round"/>
                <!-- Signal waves -->
                <path d="M26 12 Q30 8 34 12" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
                <path d="M28 8 Q33 3 38 8" fill="none" stroke="var(--color-primary)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                <!-- Feed point -->
                <circle cx="20" cy="14" r="2.5" fill="var(--color-primary)"/>
            </svg>
            <span class="logo-text"><span class="logo-mesh">Mesh</span><span class="logo-sat">Sat</span></span>
        </a>

        <ul class="nav-links" id="nav-links">
            {{ range .Site.Menus.main }}
            <li>
                <a href="{{ .URL }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}{{ if .Params.highlight }} class="nav-hub-btn"{{ end }}>
                    {{ .Name }}{{ if and .Params.external (not .Params.highlight) }} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>{{ end }}
                </a>
            </li>
            {{ end }}
        </ul>

        <div class="nav-actions">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>

            <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
</header>
