<header class="site-header">
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <nav class="container" role="navigation" aria-label="Main navigation">
        <a href="/" class="logo" aria-label="MeshSat Home">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="32" height="32" class="logo-icon">
                <!-- Orbital ring -->
                <circle cx="18" cy="18" r="16" fill="none" stroke="var(--color-primary)" stroke-width="1.5" opacity="0.35"/>
                <!-- Mesh connections -->
                <line x1="18" y1="12" x2="11" y2="22" stroke="var(--color-primary)" stroke-width="1.2" opacity="0.4"/>
                <line x1="18" y1="12" x2="25" y2="22" stroke="var(--color-primary)" stroke-width="1.2" opacity="0.4"/>
                <line x1="11" y1="22" x2="25" y2="22" stroke="var(--color-primary)" stroke-width="1.2" opacity="0.3"/>
                <line x1="18" y1="12" x2="18" y2="6" stroke="var(--color-primary)" stroke-width="1.2" opacity="0.4"/>
                <!-- Mesh nodes -->
                <circle cx="18" cy="12" r="2.5" fill="var(--color-primary)"/>
                <circle cx="11" cy="22" r="2" fill="var(--color-primary)" opacity="0.8"/>
                <circle cx="25" cy="22" r="2" fill="var(--color-primary)" opacity="0.8"/>
                <circle cx="18" cy="6" r="1.5" fill="var(--color-primary)" opacity="0.6"/>
                <!-- Satellite -->
                <rect x="27" y="6" width="4" height="2.5" rx="0.5" fill="var(--color-primary)" opacity="0.7"/>
                <rect x="25" y="7" width="2" height="1" rx="0.3" fill="var(--color-primary)" opacity="0.5"/>
                <rect x="31" y="7" width="2" height="1" rx="0.3" fill="var(--color-primary)" opacity="0.5"/>
                <!-- Signal arc from satellite -->
                <path d="M27 10 Q24 13 21 11" fill="none" stroke="var(--color-primary)" stroke-width="0.8" opacity="0.3"/>
            </svg>
            <span class="logo-text"><span class="logo-mesh">Mesh</span><span class="logo-sat">Sat</span></span>
        </a>

        <ul class="nav-links" id="nav-links">
            {{ range .Site.Menus.main }}
            <li>
                <a href="{{ .URL }}"{{ if .Params.external }} target="_blank" rel="noopener"{{ end }}{{ if .Params.highlight }} class="nav-hub-btn"{{ end }}>
                    {{ .Name }}{{ if and .Params.external (not .Params.highlight) }} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>{{ end }}
                </a>
            </li>
            {{ end }}
        </ul>

        <div class="nav-actions">
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle theme">
                <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>

            <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>
</header>
