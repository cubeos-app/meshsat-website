# =============================================================================
# MeshSat Website Pipeline — Hugo + VitePress + Install → GHCR → AWX Deploy
# Serves: meshsat.net, docs.meshsat.net, get.meshsat.net
# =============================================================================
stages:
  - validate
  - build
  - docker
  - deploy

variables:
  HUGO_IMAGE: "registry-gitlab.nuclearlighters.net/infrastructure/nllei01/production/hugo-runner:1.4"
  NODE_IMAGE: "node:20-alpine"
  BASE_IMAGE: "registry-gitlab.nuclearlighters.net/infrastructure/nllei01/production/cubeos-nginx-base:latest"
  GHCR_SITE: "ghcr.io/papadopouloskyriakos/meshsat-website"
  GHCR_DOCS: "ghcr.io/papadopouloskyriakos/meshsat-docs"
  GHCR_INSTALL: "ghcr.io/papadopouloskyriakos/meshsat-releases"
  AWX_HOST: "https://awx.nuclearlighters.net"

# -----------------------------------------------------------------------------
# CONSISTENCY CHECK — traceability gate
# -----------------------------------------------------------------------------
lint:consistency:
  stage: validate
  image: alpine:latest
  tags: [docker]
  variables:
    GIT_DEPTH: 50
  before_script:
    - apk add --no-cache git bash
  script:
    - |
      bash <<'CONSISTENCY_CHECK'
      WARNINGS=()
      if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '\[MESHSAT-[0-9]+\]'; then
        if ! echo "$CI_COMMIT_MESSAGE" | grep -qE '^chore: bump version'; then
          WARNINGS+=("Traceability: commit has no [MESHSAT-XX] reference")
        fi
      fi
      echo ""
      echo "=== Consistency Check: meshsat-website ==="
      if [ ${#WARNINGS[@]} -gt 0 ]; then
        echo "WARNINGS (review recommended):"
        for w in "${WARNINGS[@]}"; do echo "  [WARN]  $w"; done
      else
        echo "  All checks passed."
      fi
      echo "PASSED"
      CONSISTENCY_CHECK
  rules:
    - when: always
  allow_failure: true

# -----------------------------------------------------------------------------
# BUILD — Hugo site + VitePress docs
# -----------------------------------------------------------------------------
build:site:
  stage: build
  image: $HUGO_IMAGE
  tags: [docker]
  script:
    - cd site
    - hugo version
    - hugo --minify --gc --environment production
  artifacts:
    paths:
      - site/public/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build:docs:
  stage: build
  image: $NODE_IMAGE
  tags: [docker]
  script:
    - cd docs
    - npm ci
    - npx vitepress build
  artifacts:
    paths:
      - docs/.vitepress/dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# -----------------------------------------------------------------------------
# DOCKER — Build and push container images to GHCR
# -----------------------------------------------------------------------------
docker:site:
  stage: docker
  image: $HUGO_IMAGE
  tags: [docker]
  variables:
    DOCKER_API_VERSION: "1.41"
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - docker login registry-gitlab.nuclearlighters.net -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - cp -r site/public/ public/
    - docker build --no-cache --build-arg BASE_IMAGE=${BASE_IMAGE} -f Dockerfile.site -t ${GHCR_SITE}:${CI_COMMIT_SHORT_SHA} -t ${GHCR_SITE}:latest .
    - docker push ${GHCR_SITE}:${CI_COMMIT_SHORT_SHA}
    - docker push ${GHCR_SITE}:latest
    - rm -rf public/
  needs:
    - job: build:site
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker:docs:
  stage: docker
  image: $HUGO_IMAGE
  tags: [docker]
  variables:
    DOCKER_API_VERSION: "1.41"
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - docker login registry-gitlab.nuclearlighters.net -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - docker build --no-cache --build-arg BASE_IMAGE=${BASE_IMAGE} -f Dockerfile.docs -t ${GHCR_DOCS}:${CI_COMMIT_SHORT_SHA} -t ${GHCR_DOCS}:latest .
    - docker push ${GHCR_DOCS}:${CI_COMMIT_SHORT_SHA}
    - docker push ${GHCR_DOCS}:latest
  needs:
    - job: build:docs
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

docker:install:
  stage: docker
  image: $HUGO_IMAGE
  tags: [docker]
  variables:
    DOCKER_API_VERSION: "1.41"
  before_script:
    - echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
    - docker login registry-gitlab.nuclearlighters.net -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
  script:
    - docker build --no-cache --build-arg BASE_IMAGE=${BASE_IMAGE} -f Dockerfile.install -t ${GHCR_INSTALL}:${CI_COMMIT_SHORT_SHA} -t ${GHCR_INSTALL}:latest .
    - docker push ${GHCR_INSTALL}:${CI_COMMIT_SHORT_SHA}
    - docker push ${GHCR_INSTALL}:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# -----------------------------------------------------------------------------
# DEPLOY — Trigger AWX deployment
# -----------------------------------------------------------------------------
deploy:
  stage: deploy
  image: $HUGO_IMAGE
  tags: [docker]
  script:
    - |
      echo "Triggering AWX deployment..."
      RESPONSE=$(curl -s -X POST \
        -H "Authorization: Bearer ${AWX_TOKEN}" \
        -H "Content-Type: application/json" \
        -d '{}' \
        "${AWX_HOST}/api/v2/job_templates/${AWX_JOB_TEMPLATE_ID}/launch/")
      echo "AWX response: $RESPONSE"
      JOB_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
      if [ -z "$JOB_ID" ]; then
        echo "ERROR: Failed to launch AWX job"
        echo "$RESPONSE" | jq .
        exit 1
      fi
      echo "AWX job launched: $JOB_ID"
      # Poll for completion (max 5 minutes)
      for i in $(seq 1 30); do
        sleep 10
        STATUS=$(curl -s \
          -H "Authorization: Bearer ${AWX_TOKEN}" \
          "${AWX_HOST}/api/v2/jobs/${JOB_ID}/" | jq -r '.status')
        echo "Job $JOB_ID status: $STATUS"
        case "$STATUS" in
          successful) echo "Deployment successful"; exit 0 ;;
          failed|error|canceled) echo "Deployment $STATUS"; exit 1 ;;
        esac
      done
      echo "ERROR: Deployment timed out after 5 minutes"
      exit 1
  needs:
    - job: docker:site
    - job: docker:docs
    - job: docker:install
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
